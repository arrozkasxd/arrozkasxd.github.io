<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pastelería</title>

<style>

body{
    margin:0;
    font-family: Arial;
}

/* NAVBAR */

header{
    background:#f5ede6;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
}

.logo{
    font-size:32px;
    font-weight:bold;
    color:#6b1d45;
}

nav a{
    margin:0 10px;
    text-decoration:none;
    color:#333;
}

.search{
    padding:8px;
    border-radius:20px;
    border:1px solid #ccc;
}

/* CATEGORÍAS */

.categories{
    background:#7a4b39;
    color:white;
    display:flex;
    justify-content:center;
    gap:40px;
    padding:15px;
}

/* BANNER */

.banner{
    height:500px;

    background-image:url('https://images.unsplash.com/photo-1578985545062-69928b1d9587?q=80&w=1200');

    background-size:cover;
    background-position:center;

    display:flex;
    align-items:center;
    justify-content:flex-end;
}

.banner-text{
    background:rgba(0,0,0,0.4);
    color:white;
    padding:30px;
    margin-right:60px;
    border-radius:10px;
}

.banner button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#fff;
    cursor:pointer;
    font-weight:bold;
}

</style>
</head>

<body>

<header>

<div class="logo">
SweetArroz
</div>

<nav>
<a href="#">Inicio</a>
<a href="Nosotros.html">Nosotros</a>
<a href="#">Catálogo</a>
<a href="#">Contacto</a>
</nav>

</header>

<div class="categories">
<div>Tortas</div>
<div>Tartas</div>
<div>Cupcakes</div>
<div>Donas</div>
</div>

<section class="banner">

<div class="banner-text">
<h1>Tortas al gusto</h1>

<p>Los mejores postres para ti</p>

<a href="Menú.html">
  <button>Ver catálogo</button>
</a>
</div>

</section>

</html>
