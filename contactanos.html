<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contacto</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f8f3ef;
}

/* HEADER */

header{
    background:#6b1d45;
    color:white;
    text-align:center;
    padding:35px;
}

header h1{
    margin:0;
    font-size:40px;
}

/* CONTENEDOR */

.container{
    max-width:900px;
    margin:auto;
    padding:50px 20px;
}

/* TEXTO */

.text{
    text-align:center;
    margin-bottom:40px;
}

.text h2{
    color:#6b1d45;
    font-size:35px;
}

.text p{
    color:#555;
    font-size:18px;
}

/* FORMULARIO */

form{
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

/* INPUTS */

input,
textarea{
    width:100%;
    padding:15px;
    margin-top:15px;
    margin-bottom:25px;
    border:none;
    border-radius:10px;
    background:#f1f1f1;
    font-size:16px;
}

/* BOTÓN */

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#6b1d45;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#8a2a5c;
}

/* INFO */

.info{
    margin-top:50px;
    text-align:center;
}

.info h3{
    color:#6b1d45;
}

.info p{
    color:#555;
}

/* VOLVER */

.back{
    text-align:center;
    margin-top:40px;
}

.back button{
    width:250px;
}

</style>

</head>

<body>

<header>

<h1> Contáctanos</h1>

</header>

<div class="container">

<div class="text">

<h2>¡Estamos para ayudarte!</h2>

<p>
¿Tienes dudas, pedidos especiales o consultas?
En SweetArroz estaremos felices de atenderte.
</p>

</div>

<!-- FORMULARIO -->

<form>

<input type="text" placeholder="Tu nombre">

<input type="email" placeholder="Tu correo">

<textarea rows="6" placeholder="Escribe tu mensaje"></textarea>

<button>
Enviar mensaje
</button>

</form>

<!-- INFORMACIÓN -->

<div class="info">

<h3> Dirección</h3>
<p>Chiclayo, Perú</p>

<h3> Teléfono</h3>
<p>+51 940 430 481</p>

<h3> Instagram</h3>
<p>@arroz.kad</p>

</div>

<!-- VOLVER -->

<div class="back">

<a href="index.html">

<button>
Volver al inicio
</button>

</a>

</div>

</div>

</body>
</html>
